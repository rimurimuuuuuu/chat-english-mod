name: Build Mod

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.11-bin.zip -q
          unzip -q gradle-8.11-bin.zip
          echo "$PWD/gradle-8.11/bin" >> $GITHUB_PATH
      - run: gradle build
      - uses: actions/upload-artifact@v4
        with:
          name: chat-english-mod
          path: build/libs/*-1.0.0.jar
          if-no-files-found: error
